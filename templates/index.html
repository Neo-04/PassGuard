<!DOCTYPE html>
<html>
<head>
    <title>Password Strength Checker</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h2>Password Strength Checker</h2>

    <input type="password" id="password" placeholder="Enter password" onkeyup="checkPassword()">

    <div id="strength"></div>
</div>

<script>
function checkPassword(){
    let password = document.getElementById("password").value;

    fetch("/check", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({password: password})
    })
    .then(response => response.json())
    .then(data => {
        let result = document.getElementById("strength");
        result.innerHTML = "Strength: " + data.strength;

        if(data.strength == "Weak"){
            result.style.color = "red";
        }
        else if(data.strength == "Medium"){
            result.style.color = "orange";
        }
        else{
            result.style.color = "green";
        }
    });
}
</script>

</body>
</html>
